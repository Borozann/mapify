<!DOCTYPE html><html lang=en><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><meta http-equiv=X-UA-Compatible content="ie=edge"><link rel="icon shortcut" type=image/png href=icon.f681b2ba.png><link rel=stylesheet href=mapty.541898c8.css><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap" rel=stylesheet><link rel=stylesheet href=mapty.ac0fd8f0.css><script defer type=module src=mapty.f71faaf8.js></script><title>Mapty</title><body>
    <div class=sidebar>
      <img src=logo.b6c47bf5.png alt=Logo class=logo>

      <ul class=workouts>
        <form class="form hidden">
          <div class=form__row>
            <label class=form__label>Type</label>
            <select class="form__input form__input--type">
              <option value=running>Running</option>
              <option value=cycling>Cycling</option>
            </select>
          </div>
          <div class=form__row>
            <label class=form__label>Distance</label>
            <input class="form__input form__input--distance" placeholder=km>
          </div>
          <div class=form__row>
            <label class=form__label>Duration</label>
            <input class="form__input form__input--duration" placeholder=min>
          </div>
          <div class=form__row>
            <label class=form__label>Cadence</label>
            <input class="form__input form__input--cadence" placeholder=step/min>
          </div>
          <div class="form__row form__row--hidden">
            <label class=form__label>Elev Gain</label>
            <input class="form__input form__input--elevation" placeholder=meters>
          </div>
          <button class=form__btn>OK</button>
        </form>

        
      </ul>
    </div>

    <div id=map></div>
